name: PR Validation

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build
  codex-review:
    runs-on: [self-hosted, windows]
    needs: build-and-test
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Install Codex CLI
        shell: pwsh
        run: |
          npm install -g @openai/codex @openai/codex-responses-api-proxy
  
      - name: Add npm global bin to PATH
        shell: pwsh
        run: |
          $prefix = npm config get prefix
          Write-Host "npm prefix: $prefix"
          Add-Content -Path $env:GITHUB_PATH -Value $prefix
  
      - name: Verify Codex CLI
        shell: pwsh
        run: |
          $prefix = npm config get prefix
          Write-Host "npm prefix: $prefix"
          Get-ChildItem -LiteralPath $prefix
          where.exe codex
          where.exe codex-responses-api-proxy
  
      - name: Codex Review
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          safety-strategy: unsafe
          prompt: |
            Review this pull request.
            Focus on:
            - Bugs
            - Security issues
            - SQL Server performance
            - Entity Framework queries
            - Breaking changes
            - Missing tests
            - Do not suggest cosmetic changes.
