name: PR Validation

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Para proyecto .NET
      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

  codex-review:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Codex Review
        if: runner.os != 'Windows'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          safety-strategy: unsafe
          prompt: |
            Review this pull request.
            Focus on:
            - Bugs
            - Security issues
            - SQL Server performance
            - Entity Framework queries
            - Breaking changes
            - Missing tests
            - Do not suggest cosmetic changes.

      - name: Skip Codex Review on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Skipping Codex Review on Windows because openai/codex-action@v1 requires bash/WSL for this configuration."
