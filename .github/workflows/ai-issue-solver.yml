name: AI Autofix Agent

# 1. ¿Cuándo se ejecuta? Cuando un Issue es etiquetado
on:
  issues:
    types: [labeled]

# 2. Permisos necesarios para que el bot pueda crear ramas y Pull Requests
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-resolve:
    # 3. Solo se ejecuta si la etiqueta es exactamente 'ia-autofix'
    if: github.event.label.name == 'ia-autofix'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar el código (Checkout)
        uses: actions/checkout@v4

      - name: ⚙️ Configurar .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: 🤖 Ejecutar AiSquad.Cli (Nuestro Agente IA)
        # Pasamos el Título y el Cuerpo del Issue como argumentos a nuestra app de consola
        run: |
          dotnet run --project AiSquad.Cli/AiSquad.Cli.csproj "${{ github.event.issue.title }}" "${{ github.event.issue.body }}"

      - name: 🌿 Crear nueva rama
        # Creamos una rama única basada en el número del issue
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b ai-fix-issue-${{ github.event.issue.number }}

      - name: 💾 Hacer Commit de los archivos generados
        run: |
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🤖 IA Auto-Fix: Solución generada para el Issue #${{ github.event.issue.number }}"
          git push origin ai-fix-issue-${{ github.event.issue.number }}

      - name: 🚀 Crear Pull Request
        env:
          GH_TOKEN: ${{ secrets.PR_CREATOR_TOKEN }}
        run: |
          gh pr create \
          --title "🤖 Solución IA para: ${{ github.event.issue.title }}" \
          --body "Este PR fue generado automáticamente por **AiSquad.Cli** para resolver el issue #${{ github.event.issue.number }}. Por favor, revisa el código y las pruebas unitarias antes de aprobar." \
          --base main \
          --head ai-fix-issue-${{ github.event.issue.number }}
